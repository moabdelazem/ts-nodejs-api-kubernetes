name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

env:
  NODE_VERSION: 22
  DOCKER_IMAGE: moabdelazem/ts-nodejs-api-kubernetes

jobs:
  # ─── Job 1: Validate (runs on every PR and push) ───
  validate:
    name: Validate the codebase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  # ─── Job 2: Semantic Release (auto-version + auto-tag on main) ───
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Job 3: Build & Push Docker Image ───
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [validate, semantic-release]
    # Run when:
    #   - semantic-release published a new version (semver tags), OR
    #   - push to develop (dev snapshot tags)
    if: |
      always() &&
      needs.validate.result == 'success' &&
      github.event_name == 'push' &&
      (
        needs.semantic-release.outputs.new_release_published == 'true' ||
        github.ref_name == 'develop'
      )
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ needs.semantic-release.outputs.new_release_published }}" == "true" ]]; then
            # Semantic release created a new version
            VERSION="${{ needs.semantic-release.outputs.new_release_version }}"
            MAJOR="${VERSION%%.*}"
            MINOR="${VERSION%.*}"
            echo "tags=${{ env.DOCKER_IMAGE }}:${VERSION},${{ env.DOCKER_IMAGE }}:${MINOR},${{ env.DOCKER_IMAGE }}:${MAJOR},${{ env.DOCKER_IMAGE }}:latest" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_name }}" == "develop" ]]; then
            # Push to develop — dev snapshot
            SHA="${GITHUB_SHA::7}"
            echo "tags=${{ env.DOCKER_IMAGE }}:dev-${SHA}" >> "$GITHUB_OUTPUT"
            echo "version=dev-${SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tag.outputs.tags }}
          labels: |
            org.opencontainers.image.version=${{ steps.tag.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
